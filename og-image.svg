    <text x="34" y="125" font-family="Menlo, Monaco, monospace" font-size="24" font-weight="700" fill="#6f5b43">15 scraps. One pasteboard.</text>
    <text x="34" y="163" font-family="Menlo, Monaco, monospace" font-size="24" font-weight="700" fill="#6f5b43">Make the artifact.</text>
  </g>

  <g transform="translate(574 346) rotate(-5)" filter="url(#shadow)">
