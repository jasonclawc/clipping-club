<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="10" dy="10" stdDeviation="0" flood-color="#12100d" flood-opacity="0.95"/>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#12100d" stroke-opacity="0.10" stroke-width="2"/>
    </pattern>
    <pattern id="noise" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="5" r="1.2" fill="#12100d" opacity=".18"/>
      <circle cx="16" cy="14" r="1" fill="#12100d" opacity=".14"/>
      <circle cx="9" cy="19" r=".8" fill="#12100d" opacity=".12"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fff1d2"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="108" cy="52" r="260" fill="#ff6b00" opacity=".30"/>
  <circle cx="1080" cy="86" r="220" fill="#20d7ff" opacity=".16"/>
  <circle cx="770" cy="625" r="260" fill="#ff4fb8" opacity=".16"/>
  <rect width="1200" height="630" fill="url(#noise)" opacity=".55"/>

  <g transform="translate(66 52) rotate(-2)" filter="url(#shadow)">
    <polygon points="0,18 338,0 365,154 24,178" fill="#d7ff2f" stroke="#12100d" stroke-width="5"/>
    <text x="36" y="78" font-family="Arial Black, Impact, sans-serif" font-size="72" font-weight="900" fill="#12100d" letter-spacing="-4">CLIPPING</text>
    <text x="38" y="140" font-family="Arial Black, Impact, sans-serif" font-size="72" font-weight="900" fill="#12100d" letter-spacing="-4">CLUB</text>
  </g>

  <g transform="translate(690 72) rotate(6)" filter="url(#shadow)">
    <polygon points="10,0 314,22 292,250 0,222" fill="#fffdf4" stroke="#12100d" stroke-width="5"/>
    <image href="assets/real-clippings/aic-82287-moulin-rouge-la-goulue.png" x="35" y="30" width="240" height="170" preserveAspectRatio="xMidYMid slice" clip-path="polygon(5% 0,100% 4%,95% 92%,0 100%)"/>
    <rect x="34" y="208" width="216" height="10" fill="#ff6b00"/>
  </g>

  <g transform="translate(84 322) rotate(3)" filter="url(#shadow)">
    <polygon points="0,30 430,0 455,180 22,205" fill="#fffdf4" stroke="#12100d" stroke-width="4"/>
