    <text x="24" y="72" font-family="Arial Black, Impact, sans-serif" font-size="39" font-weight="900" fill="#fff1d2">POWERED BY</text>
    <text x="28" y="122" font-family="Arial Black, Impact, sans-serif" font-size="50" font-weight="900" fill="#fff1d2">@PULP.SM</text>
  </g>

  <g transform="translate(868 364) rotate(8)" filter="url(#shadow)">
